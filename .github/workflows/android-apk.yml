name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create clean Flutter app workspace
        working-directory: .
        run: |
          rm -rf __build_app
          flutter create -t app --platforms=android --org=com.softism.botmanager --project-name=softism_bot_manager __build_app
          cp pubspec.yaml __build_app/pubspec.yaml
          rm -rf __build_app/lib
          cp -R lib __build_app/lib

      - name: Flutter Pub Get
        run: |
          set -euxo pipefail
          cd __build_app
          pwd
          ls -la
          ls -la android
          flutter --version
          flutter pub get

      - name: Build Debug APK
        run: |
          set -euxo pipefail
          cd __build_app
          pwd
          ls -la
          ls -la android
          flutter build apk --debug -v

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: __build_app/build/app/outputs/flutter-apk/app-debug.apk

