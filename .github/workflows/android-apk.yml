name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android NDK (required by plugins)
        run: |
          set -euxo pipefail
          # Ensure sdkmanager is available
          yes | "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;28.2.13676358" \
            "cmake;3.22.1"

      - name: Create clean Flutter app workspace
        working-directory: .
        run: |
          rm -rf __build_app
          flutter create -t app --platforms=android --org=com.softism.botmanager --project-name=softism_bot_manager __build_app
          cp pubspec.yaml __build_app/pubspec.yaml
          rm -rf __build_app/lib
          cp -R lib __build_app/lib

          # Some plugins require core library desugaring; patch the generated Gradle (Kotlin DSL)
          # deterministically without brittle regex replacements.
          python3 - <<'PY'
          from __future__ import annotations
          from pathlib import Path
          import re
          
          p = Path("__build_app/android/app/build.gradle.kts")
          if not p.exists():
              raise SystemExit("Missing build.gradle.kts")
          
          s = p.read_text(encoding="utf-8")
          
          # Ensure compileOptions includes desugaring + Java 17.
          if "isCoreLibraryDesugaringEnabled" not in s:
              # Find compileOptions { ... } inside android { ... }
              m = re.search(r"compileOptions\s*\{\s*", s)
              if m:
                  insert_at = m.end()
                  s = (
                      s[:insert_at]
                      + "\n            sourceCompatibility = JavaVersion.VERSION_17\n"
                      + "            targetCompatibility = JavaVersion.VERSION_17\n"
                      + "            isCoreLibraryDesugaringEnabled = true\n"
                      + s[insert_at:]
                  )
              else:
                  # Create compileOptions inside android { ... }
                  am = re.search(r"android\s*\{\s*", s)
                  if not am:
                      raise SystemExit("No android { } block found")
                  insert_at = am.end()
                  s = (
                      s[:insert_at]
                      + "\n    compileOptions {\n"
                      + "        sourceCompatibility = JavaVersion.VERSION_17\n"
                      + "        targetCompatibility = JavaVersion.VERSION_17\n"
                      + "        isCoreLibraryDesugaringEnabled = true\n"
                      + "    }\n"
                      + s[insert_at:]
                  )
          
          # Ensure dependencies include coreLibraryDesugaring.
          if "coreLibraryDesugaring(" not in s:
              dm = re.search(r"dependencies\s*\{\s*", s)
              if not dm:
                  # Add dependencies block at end
                  s += '\n\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")\n}\n'
              else:
                  insert_at = dm.end()
                  s = (
                      s[:insert_at]
                      + '\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")\n'
                      + s[insert_at:]
                  )
          
          p.write_text(s, encoding="utf-8")
          print("Patched desugaring in", p)
          PY

      - name: Flutter Pub Get
        run: |
          set -euxo pipefail
          cd __build_app
          pwd
          ls -la
          ls -la android
          flutter --version
          flutter pub get

      - name: Build Debug APK
        run: |
          set -euxo pipefail
          cd __build_app
          pwd
          ls -la
          ls -la android
          flutter build apk --debug -v

      - name: Gradle diagnostics (always)
        if: ${{ always() }}
        run: |
          set -euxo pipefail
          cd __build_app/android
          chmod +x ./gradlew || true
          ./gradlew --version || true
          # Even if flutter succeeded, we want a stable error log when it didn't.
          ./gradlew :app:assembleDebug --stacktrace --info --warning-mode all || true
          # Print the most important part if it exists
          if [ -f app/build/outputs/logs/manifest-merger-debug-report.txt ]; then
            echo "--- manifest merger report ---"
            tail -n 200 app/build/outputs/logs/manifest-merger-debug-report.txt || true
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: __build_app/build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Gradle problems report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports
          path: |
            __build_app/build/reports/**
            __build_app/android/build/reports/**
            __build_app/android/app/build/reports/**

