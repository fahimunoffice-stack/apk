name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android NDK (required by plugins)
        run: |
          set -euxo pipefail
          # Ensure sdkmanager is available
          yes | "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;28.2.13676358" \
            "cmake;3.22.1"

      - name: Create clean Flutter app workspace
        working-directory: .
        run: |
          rm -rf __build_app
          flutter create -t app --platforms=android --org=com.softism.botmanager --project-name=softism_bot_manager __build_app
          cp pubspec.yaml __build_app/pubspec.yaml
          rm -rf __build_app/lib
          cp -R lib __build_app/lib

      - name: Flutter Pub Get
        run: |
          set -euxo pipefail
          cd __build_app
          pwd
          ls -la
          ls -la android
          flutter --version
          flutter pub get

      - name: Build Debug APK
        run: |
          set -euxo pipefail
          cd __build_app
          pwd
          ls -la
          ls -la android
          flutter build apk --debug -v

      - name: Gradle diagnostics (always)
        if: ${{ always() }}
        run: |
          set -euxo pipefail
          cd __build_app/android
          chmod +x ./gradlew || true
          ./gradlew --version || true
          # Even if flutter succeeded, we want a stable error log when it didn't.
          ./gradlew :app:assembleDebug --stacktrace --info --warning-mode all || true
          # Print the most important part if it exists
          if [ -f app/build/outputs/logs/manifest-merger-debug-report.txt ]; then
            echo "--- manifest merger report ---"
            tail -n 200 app/build/outputs/logs/manifest-merger-debug-report.txt || true
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: __build_app/build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Gradle problems report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports
          path: |
            __build_app/build/reports/**
            __build_app/android/build/reports/**
            __build_app/android/app/build/reports/**

